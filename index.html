<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Popup - Safari iOS</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        button {
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            color: white;
        }
        .btn-sync { background-color: #28a745; }
        .btn-async { background-color: #dc3545; }
        .log {
            margin-top: 20px;
            font-family: monospace;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>Teste de Popup (Safari iOS)</h1>
    
    <button class="btn-sync" onclick="abrirSincrono()">1. Abrir Síncrono (Funciona)</button>
    <button class="btn-async" onclick="abrirAssincrono()">2. Abrir Assíncrono (Bloqueia)</button>

    <div class="log" id="log">Clique em um dos botões...</div>

    <script>
        const logDiv = document.getElementById('log');
        const urlParaAbrir = 'https://www.google.com';

        // 1. Método Síncrono: Disparado direto na pilha de execução do clique
        function abrirSincrono() {
            logDiv.innerText = 'Abrindo síncrono imediatamente...';
            const novaJanela = window.open(urlParaAbrir, '_blank');
            
            if (!novaJanela) {
                logDiv.innerText = 'Status: Bloqueado pelo navegador!';
            } else {
                logDiv.innerText = 'Status: Aberto com sucesso!';
            }
        }

        // Simulação de uma promise/delay de 1.5 segundos
        function esperarTempo(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // 2. Método Assíncrono: Ocorre a quebra de contexto após o await
        async function abrirAssincrono() {
            logDiv.innerText = 'Aguardando 1.5 segundos...';
            
            await esperarTempo(1500);
            
            logDiv.innerText = 'Tentando abrir popup assíncrono...';
            const novaJanela = window.open(urlParaAbrir, '_blank');
            
            if (!novaJanela) {
                logDiv.innerText = 'Status: Bloqueado pelo Safari!';
            } else {
                logDiv.innerText = 'Status: Aberto (raro no iOS)';
            }
        }
    </script>
</body>
</html>
