<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Popup - Safari iOS</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        button {
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            color: white;
        }
        .btn-sync { background-color: #28a745; }
        .btn-async { background-color: #dc3545; }
        .log {
            margin-top: 20px;
            font-family: monospace;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>Teste de Popup (Safari iOS)</h1>
    
    <button class="btn-sync" onclick="abrirSincrono()">1. Abrir Síncrono (Funciona)</button>
    <button class="btn-async" onclick="abrirAssincrono()">2. Abrir Assíncrono (aba vazia + URL)</button>

    <div class="log" id="log">Clique em um dos botões...</div>

    <script>
        const logDiv = document.getElementById('log');
        const urlRede = 'https://www.userede.com.br/';

        const janelaFeatures = 'width=800,height=600,menubar=no,toolbar=no,location=yes,status=yes,resizable=yes,scrollbars=yes';

        function esperarTempo(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Atualiza a URL da janela de forma async
        async function atualizarUrl(janela) {
            await esperarTempo(1500);

            if (!janela || janela.closed) {
                logDiv.innerText = 'Status: Janela foi fechada antes da navegação.';
                return;
            }

            janela.location.href = urlRede;
            logDiv.innerText = 'Status: URL alterada para ' + urlRede;
        }

        // 1. Método Síncrono: abre about:blank no clique, depois atualiza a URL async
        function abrirSincrono() {
            logDiv.innerText = 'Abrindo síncrono (em branco)...';
            const novaJanela = window.open('about:blank', 'popupTest', janelaFeatures);

            if (!novaJanela) {
                logDiv.innerText = 'Status: Bloqueado pelo navegador!';
                return;
            }

            logDiv.innerText = 'Status: Janela em branco aberta. Atualizando URL...';
            atualizarUrl(novaJanela);
        }

        // 2. Método Assíncrono: abre aba vazia no clique, espera 1.5s, depois troca a URL
        async function abrirAssincrono() {
await esperarTempo(1500);
            logDiv.innerText = 'Abrindo aba vazia (async)...';
            const novaJanela = window.open('about:blank', 'popupTest', janelaFeatures);

            if (!novaJanela) {
                logDiv.innerText = 'Status: Bloqueado pelo Safari!';
                return;
            }

            logDiv.innerText = 'Aba vazia aberta. Aguardando 1.5s...';
            await esperarTempo(1500);

            if (!novaJanela || novaJanela.closed) {
                logDiv.innerText = 'Status: Janela foi fechada antes da navegação.';
                return;
            }

            novaJanela.location.href = urlRede;
            logDiv.innerText = 'Status: URL alterada para ' + urlRede;
        }
    </script>
</body>
</html>
